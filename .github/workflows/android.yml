name: Android CI

on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: npnpatidar/checkout@v4 # Use your forked version of actions/checkout
            - name: Set up JDK 11
              uses: npnpatidar/setup-java@v4 # Use your forked version of actions/setup-java
              with:
                  java-version: "11"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
            - name: Build with Gradle
              run: ./gradlew build
